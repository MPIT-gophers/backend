version: "2"
sql:
  - engine: "postgresql"
    schema:
      - "migrations/000001_init.up.sql"
    queries:
      - "internal/infrastructure/database/queries/*.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/infrastructure/database/sqlc"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_interface: false
        emit_exact_table_names: false
        emit_pointers_for_null_types: true
