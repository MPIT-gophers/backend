basePath: /api/v1
definitions:
  action.CompleteMAXAuthRequest:
    properties:
      init_data:
        type: string
      session_id:
        type: string
    type: object
  action.CreateEventRequest:
    properties:
      budget:
        type: string
      city:
        type: string
      event_date:
        type: string
      event_time:
        type: string
      expected_guest_count:
        type: integer
    type: object
  action.ExchangeMAXAuthRequest:
    properties:
      session_id:
        type: string
    type: object
  action.FundItemRequest:
    properties:
      amount:
        type: number
    type: object
  action.HealthData:
    properties:
      database:
        type: string
      status:
        type: string
    type: object
  action.JoinEventByTokenRequest:
    properties:
      token:
        type: string
    type: object
  action.LoginWithMAXRequest:
    properties:
      init_data:
        type: string
    type: object
  action.ParseWishlistRequest:
    properties:
      text:
        type: string
    type: object
  action.SubmitGuestIdeaRequest:
    properties:
      text:
        type: string
    type: object
  action.UpdateGuestStatusRequest:
    properties:
      attendance_status:
        type: string
    type: object
  action.UpdateMeRequest:
    properties:
      full_name:
        type: string
      phone:
        type: string
    type: object
  core.ApprovalStatus:
    enum:
    - pending
    - approved
    - rejected
    type: string
    x-enum-varnames:
    - ApprovalPending
    - ApprovalApproved
    - ApprovalRejected
  core.AttendanceStatus:
    enum:
    - pending
    - confirmed
    - declined
    type: string
    x-enum-varnames:
    - AttendancePending
    - AttendanceConfirmed
    - AttendanceDeclined
  core.AuthSession:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/core.User'
    type: object
  core.Event:
    properties:
      access_role:
        type: string
      approval_status:
        type: string
      attendance_status:
        type: string
      budget:
        type: string
      city:
        type: string
      created_at:
        type: string
      description:
        type: string
      event_date:
        type: string
      event_time:
        type: string
      expected_guest_count:
        type: integer
      id:
        type: string
      invite_token:
        type: string
      selected_variant_id:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
      variants:
        items:
          $ref: '#/definitions/core.EventVariant'
        type: array
    type: object
  core.EventGuest:
    properties:
      approval_status:
        $ref: '#/definitions/core.ApprovalStatus'
      attendance_status:
        $ref: '#/definitions/core.AttendanceStatus'
      created_at:
        type: string
      event_id:
        type: string
      full_name:
        type: string
      id:
        type: string
      phone:
        type: string
      plus_one_count:
        type: integer
      user_id:
        type: string
    type: object
  core.EventGuestStats:
    properties:
      approved:
        type: integer
      attendance_pending:
        type: integer
      confirmed:
        type: integer
      declined:
        type: integer
      pending_approval:
        type: integer
      rejected:
        type: integer
    type: object
  core.EventLocation:
    properties:
      address:
        type: string
      ai_comment:
        type: string
      ai_score:
        type: string
      contacts:
        type: string
      created_at:
        type: string
      event_id:
        type: string
      id:
        type: string
      is_rejected:
        type: boolean
      rejected_at:
        type: string
      sort_order:
        type: integer
      source:
        type: string
      title:
        type: string
      updated_at:
        type: string
      variant_id:
        type: string
    type: object
  core.EventVariant:
    properties:
      created_at:
        type: string
      description:
        type: string
      event_id:
        type: string
      generation_error:
        type: string
      id:
        type: string
      llm_request_id:
        type: string
      locations:
        items:
          $ref: '#/definitions/core.EventLocation'
        type: array
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
      variant_number:
        type: integer
    type: object
  core.MAXAuthSession:
    properties:
      completed_at:
        type: string
      exchanged_at:
        type: string
      expires_at:
        type: string
      session_id:
        type: string
      status:
        type: string
    type: object
  core.MAXAuthStart:
    properties:
      expires_at:
        type: string
      max_link:
        type: string
      session_id:
        type: string
    type: object
  core.User:
    properties:
      created_at:
        type: string
      full_name:
        type: string
      id:
        type: string
      phone:
        type: string
      updated_at:
        type: string
    type: object
  response.ErrorBody:
    properties:
      message:
        type: string
    type: object
  response.ErrorEnvelope:
    properties:
      error:
        $ref: '#/definitions/response.ErrorBody'
    type: object
  response.SuccessEnvelope:
    properties:
      data: {}
    type: object
host: mpit-bot.kostya1024.ru
info:
  contact: {}
  description: |-
    Backend API для сервиса mpit2026-reg.

    Основные возможности:
    - авторизация через MAX mini app и локальный JWT
    - получение и обновление профиля текущего пользователя
    - создание событий, получение invite token и вход по нему
    - управление гостями и фиксация статуса посещения
    - wishlist и фото внутри события

    Аутентификация:
    - защищённые методы требуют заголовок Authorization: Bearer <jwt>
    - JWT можно получить через /auth/max/login или через мобильный flow /auth/max/start -> /auth/max/complete -> /auth/max/exchange

    Swagger UI доступен по адресу /api/docs/.
  title: mpit2026-reg API
  version: 0.1.0
paths:
  /api/v1/events/{eventID}/photos:
    get:
      description: Retrieves a list of photo URLs for the event. Only accessible to
        confirmed guests or organizers. Pending/declined guests get 403 Forbidden.
      parameters:
      - description: Event UUID
        in: path
        name: eventID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: photos array of strings
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid event ID format
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "403":
          description: Forbidden (guest not confirmed)
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Get event photos
      tags:
      - photos
  /api/v1/events/{eventID}/photos/upload:
    post:
      consumes:
      - multipart/form-data
      description: Uploads up to 10 photos as multipart/form-data for the given event.
        Only guests or organizers can upload. Max file size is 10MB per photo.
      parameters:
      - description: Event UUID
        in: path
        name: eventID
        required: true
        type: string
      - description: Photos to upload
        in: formData
        name: photos
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties: true
            type: object
        "207":
          description: 'Multi-Status: Some photos failed to upload'
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "400":
          description: Bad request or max 10 photos exceeded
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "413":
          description: Payload too large
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Upload event photos
      tags:
      - photos
  /api/v1/events/{eventID}/wishlist:
    get:
      description: Retrieves the wishlist items for the event. Guests see masked details
        (booked by others is hidden), organizers see everything.
      parameters:
      - description: Event UUID
        in: path
        name: eventID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: items array
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid event ID format
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Get event wishlist
      tags:
      - wishlist
  /api/v1/events/{eventID}/wishlist/{itemID}/book:
    post:
      description: Allows a guest to book an entire item so others cannot fund or
        book it. Returns HTTP 409 Conflict if already booked.
      parameters:
      - description: Event UUID
        in: path
        name: eventID
        required: true
        type: string
      - description: Item UUID
        in: path
        name: itemID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: message
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid UUID
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Item already booked or has funds
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Book a wishlist item
      tags:
      - wishlist
  /api/v1/events/{eventID}/wishlist/{itemID}/fund:
    post:
      consumes:
      - application/json
      description: Allows a guest to crowdsource funds for an item. Returns HTTP 409
        if the item is already fully booked.
      parameters:
      - description: Event UUID
        in: path
        name: eventID
        required: true
        type: string
      - description: Item UUID
        in: path
        name: itemID
        required: true
        type: string
      - description: Amount payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.FundItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: current_fund amount
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid payload or UUID
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Item is already booked
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Fund a wishlist item partially
      tags:
      - wishlist
  /api/v1/events/{eventID}/wishlist/ideas:
    post:
      consumes:
      - application/json
      description: Validates guest's text against the anti-wishlist using AI. Returns
        whether allowed or blocked, along with the reasoning.
      parameters:
      - description: Event UUID
        in: path
        name: eventID
        required: true
        type: string
      - description: Idea text payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.SubmitGuestIdeaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: allowed, reason, item
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Invalid request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "500":
          description: Failed to submit idea
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Submit a guest gift idea
      tags:
      - wishlist
  /api/v1/events/{eventID}/wishlist/parse:
    post:
      consumes:
      - application/json
      description: Uses AI to parse freeform text into wishlist and anti-wishlist
        items. Generates a new wishlist for the event. Only organizers can call this.
      parameters:
      - description: Event UUID
        in: path
        name: eventID
        required: true
        type: string
      - description: Text payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.ParseWishlistRequest'
      produces:
      - application/json
      responses:
        "200":
          description: items and anti_items arrays
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Parse raw text into wishlist
      tags:
      - wishlist
  /auth/max/complete:
    post:
      consumes:
      - application/json
      description: |-
        Второй шаг мобильного сценария входа.
        Метод принимает session_id, созданный через /auth/max/start, и init_data, полученный после открытия MAX mini app.
        Backend проверяет подпись MAX, срок действия init_data и соответствие start_param созданной auth session.
        После успешной проверки session переходит в состояние completed, но JWT ещё не выдаётся.
      parameters:
      - description: Тело запроса с session_id и init_data из MAX
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.CompleteMAXAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Auth session успешно завершена
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.MAXAuthSession'
              type: object
        "400":
          description: Некорректный JSON или обязательные поля отсутствуют
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: init_data невалиден, просрочен или start_param не соответствует
            session_id
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Auth session не найдена
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Сессия уже завершена, уже обменяна на JWT или истекла
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Завершить мобильный auth flow через MAX init_data
      tags:
      - auth
  /auth/max/exchange:
    post:
      consumes:
      - application/json
      description: |-
        Финальный шаг мобильного auth flow.
        Метод принимает session_id, проверяет, что auth session уже находится в состоянии completed, и только после этого выдаёт JWT backend.
        После успешного обмена повторное использование той же session запрещено.
      parameters:
      - description: Тело запроса с session_id для обмена на JWT
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.ExchangeMAXAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: JWT успешно выдан
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.AuthSession'
              type: object
        "400":
          description: Некорректный JSON или пустой session_id
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Auth session не найдена
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Сессия ещё не готова, уже обменяна, уже использована или истекла
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Обменять completed auth session на локальный JWT
      tags:
      - auth
  /auth/max/login:
    post:
      consumes:
      - application/json
      description: |-
        Упрощённый сценарий авторизации для случая, когда frontend уже работает внутри MAX mini app.
        Метод принимает init_data из window.WebApp.initData, валидирует подпись, срок жизни данных и идентичность пользователя.
        Если пользователь ещё не существует в системе, он будет создан автоматически через OAuth-привязку.
        В ответе возвращается локальный JWT и профиль пользователя.
      parameters:
      - description: Тело запроса с init_data из MAX mini app
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.LoginWithMAXRequest'
      produces:
      - application/json
      responses:
        "200":
          description: JWT успешно выдан
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.AuthSession'
              type: object
        "400":
          description: Некорректный JSON или пустой init_data
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: init_data невалиден, просрочен или не прошёл проверку подписи
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Конфликт бизнес-логики авторизации
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Войти по MAX init_data и сразу получить JWT
      tags:
      - auth
  /auth/max/session/{sessionID}:
    get:
      description: |-
        Возвращает текущее состояние auth session, созданной через /auth/max/start.
        Используется для polling-сценария, когда один клиент ждёт, пока пользователь завершит вход в MAX на другом устройстве или в другом окне.
        Возможные статусы описаны в core.MAXAuthSession.
      parameters:
      - description: ID auth session
        in: path
        name: sessionID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Текущий статус auth session
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.MAXAuthSession'
              type: object
        "400":
          description: Некорректный session_id
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Auth session не найдена
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Получить статус MAX auth session
      tags:
      - auth
  /auth/max/start:
    post:
      description: |-
        Создаёт временную auth session для мобильного сценария входа через MAX.
        В ответе возвращается session_id и deep link на MAX mini app.
        Пользователь должен открыть ссылку, подтвердить вход внутри MAX, после чего фронтенд или backend может опрашивать статус сессии.
        Этот метод полезен, когда вход начинается не из уже открытого mini app, а из внешнего клиента.
      produces:
      - application/json
      responses:
        "201":
          description: Создана auth session и ссылка для входа
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.MAXAuthStart'
              type: object
        "503":
          description: 'MAX auth недоступен: не настроен bot username или недоступен
            внешний MAX API'
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Запустить мобильный auth flow через MAX mini app
      tags:
      - auth
  /events:
    post:
      consumes:
      - application/json
      parameters:
      - description: Event payload
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.CreateEventRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.Event'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Conflict
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Create event
      tags:
      - events
  /events/{eventID}:
    get:
      parameters:
      - description: Event ID
        in: path
        name: eventID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.Event'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Get event by id
      tags:
      - events
  /events/{eventID}/guests:
    get:
      parameters:
      - description: Event ID
        in: path
        name: eventID
        required: true
        type: string
      - description: Filter by approval status (pending, approved, rejected)
        in: query
        name: approval_status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/core.EventGuest'
                  type: array
              type: object
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: List event guests
      tags:
      - events
  /events/{eventID}/guests/{guestID}/status:
    patch:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventID
        required: true
        type: string
      - description: Guest ID
        in: path
        name: guestID
        required: true
        type: string
      - description: Attendance update
        in: body
