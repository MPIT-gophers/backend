basePath: /api/v1
definitions:
  action.CompleteMAXAuthRequest:
    properties:
      init_data:
        type: string
      session_id:
        type: string
    type: object
  action.CreateEventRequest:
    properties:
      budget:
        type: string
      city:
        type: string
      date:
        type: string
      energy:
        type: string
      scale:
        type: integer
      time:
        type: string
    type: object
  action.ExchangeMAXAuthRequest:
    properties:
      session_id:
        type: string
    type: object
  action.FundItemRequest:
    properties:
      amount:
        type: number
    type: object
  action.HealthData:
    properties:
      database:
        type: string
      status:
        type: string
    type: object
  action.JoinEventByTokenRequest:
    properties:
      token:
        type: string
    type: object
  action.LoginWithMAXRequest:
    properties:
      init_data:
        type: string
    type: object
  action.ParseWishlistRequest:
    properties:
      text:
        type: string
    type: object
  action.SubmitGuestIdeaRequest:
    properties:
      text:
        type: string
    type: object
  action.UpdateGuestStatusRequest:
    properties:
      attendance_status:
        type: string
    type: object
  action.UpdateMeRequest:
    properties:
      full_name:
        type: string
      phone:
        type: string
    type: object
  core.ApprovalStatus:
    enum:
    - pending
    - approved
    - rejected
    type: string
    x-enum-varnames:
    - ApprovalPending
    - ApprovalApproved
    - ApprovalRejected
  core.AttendanceStatus:
    enum:
    - pending
    - confirmed
    - declined
    type: string
    x-enum-varnames:
    - AttendancePending
    - AttendanceConfirmed
    - AttendanceDeclined
  core.AuthSession:
    properties:
      access_token:
        type: string
      expires_at:
        type: string
      token_type:
        type: string
      user:
        $ref: '#/definitions/core.User'
    type: object
  core.Event:
    properties:
      access_role:
        type: string
      approval_status:
        type: string
      attendance_status:
        type: string
      budget:
        type: string
      city:
        type: string
      created_at:
        type: string
      description:
        type: string
      event_date:
        type: string
      event_time:
        type: string
      expected_guest_count:
        type: integer
      id:
        type: string
      invite_token:
        type: string
      selected_variant_id:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
      variants:
        items:
          $ref: '#/definitions/core.EventVariant'
        type: array
    type: object
  core.EventGuest:
    properties:
      approval_status:
        $ref: '#/definitions/core.ApprovalStatus'
      attendance_status:
        $ref: '#/definitions/core.AttendanceStatus'
      created_at:
        type: string
      event_id:
        type: string
      full_name:
        type: string
      id:
        type: string
      phone:
        type: string
      plus_one_count:
        type: integer
      user_id:
        type: string
    type: object
  core.EventGuestStats:
    properties:
      approved:
        type: integer
      attendance_pending:
        type: integer
      confirmed:
        type: integer
      declined:
        type: integer
      pending_approval:
        type: integer
      rejected:
        type: integer
    type: object
  core.EventLocation:
    properties:
      address:
        type: string
      ai_comment:
        type: string
      ai_score:
        type: string
      contacts:
        type: string
      created_at:
        type: string
      event_id:
        type: string
      id:
        type: string
      is_rejected:
        type: boolean
      rejected_at:
        type: string
      sort_order:
        type: integer
      source:
        type: string
      title:
        type: string
      updated_at:
        type: string
      variant_id:
        type: string
    type: object
  core.EventVariant:
    properties:
      created_at:
        type: string
      description:
        type: string
      event_id:
        type: string
      generation_error:
        type: string
      id:
        type: string
      llm_request_id:
        type: string
      locations:
        items:
          $ref: '#/definitions/core.EventLocation'
        type: array
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
      variant_number:
        type: integer
    type: object
  core.MAXAuthSession:
    properties:
      completed_at:
        type: string
      exchanged_at:
        type: string
      expires_at:
        type: string
      session_id:
        type: string
      status:
        type: string
    type: object
  core.MAXAuthStart:
    properties:
      expires_at:
        type: string
      max_link:
        type: string
      session_id:
        type: string
    type: object
  core.User:
    properties:
      created_at:
        type: string
      full_name:
        type: string
      id:
        type: string
      phone:
        type: string
      updated_at:
        type: string
    type: object
  response.ErrorBody:
    properties:
      message:
        type: string
    type: object
  response.ErrorEnvelope:
    properties:
      error:
        $ref: '#/definitions/response.ErrorBody'
    type: object
  response.SuccessEnvelope:
    properties:
      data: {}
    type: object
host: mpit-bot.kostya1024.ru
info:
  contact: {}
  description: |-
    Backend API для сервиса mpit2026-reg.

    Основные возможности:
    - авторизация через MAX mini app и локальный JWT
    - получение и обновление профиля текущего пользователя
    - создание событий, получение invite token и вход по нему
    - управление гостями и фиксация статуса посещения
    - wishlist и фото внутри события

    Аутентификация:
    - защищённые методы требуют заголовок Authorization: Bearer <jwt>
    - JWT можно получить через /auth/max/login или через мобильный flow /auth/max/start -> /auth/max/complete -> /auth/max/exchange

    Swagger UI доступен по адресу /api/docs/.
  title: mpit2026-reg API
  version: 0.1.0
paths:
  /api/v1/events/{eventID}/photos:
    get:
      description: |-
        Возвращает список URL фотографий, привязанных к событию.
        Доступ к фотографиям есть только у пользователей, которым разрешено читать событие и связанные с ним материалы.
        Если у пользователя недостаточно прав, backend вернёт 403.
      parameters:
      - description: Идентификатор события
        in: path
        name: eventID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Массив URL фотографий события
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Некорректный eventID
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "403":
          description: Недостаточно прав для просмотра фотографий
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "500":
          description: Внутренняя ошибка при получении списка фотографий
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Получить фотографии события
      tags:
      - photos
  /api/v1/events/{eventID}/photos/upload:
    post:
      consumes:
      - multipart/form-data
      description: |-
        Принимает multipart/form-data с набором файлов и загружает фотографии в контекст указанного события.
        За один запрос можно загрузить не более 10 файлов.
        Метод предназначен для гостей и организаторов события; размер входного multipart-пакета ограничен backend-логикой.
      parameters:
      - description: Идентификатор события
        in: path
        name: eventID
        required: true
        type: string
      - description: Один или несколько файлов фотографий
        in: formData
        name: photos
        required: true
        type: file
      produces:
      - application/json
      responses:
        "200":
          description: Фотографии успешно загружены
          schema:
            additionalProperties: true
            type: object
        "207":
          description: Часть файлов загрузилась, часть завершилась ошибкой
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "400":
          description: Некорректный eventID, отсутствие файлов или превышение лимита
            количества
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "413":
          description: Слишком большой multipart-запрос
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Загрузить фотографии события
      tags:
      - photos
  /api/v1/events/{eventID}/wishlist:
    get:
      description: |-
        Возвращает список wishlist-позиций, привязанных к событию.
        Содержимое ответа может зависеть от роли пользователя: организатор видит больше деталей, гостям часть информации может быть скрыта.
        Метод используется для отображения списка подарков и текущего состояния бронирования или финансирования.
      parameters:
      - description: Идентификатор события
        in: path
        name: eventID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Массив wishlist-позиций события
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Некорректный eventID
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "500":
          description: Внутренняя ошибка при получении wishlist
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Получить wishlist события
      tags:
      - wishlist
  /api/v1/events/{eventID}/wishlist/{itemID}/book:
    post:
      description: |-
        Позволяет пользователю забронировать конкретный подарок полностью.
        После бронирования item нельзя частично финансировать или повторно бронировать другим участникам.
        Если позиция уже занята или по ней уже есть сбор средств, backend вернёт конфликт.
      parameters:
      - description: Идентификатор события
        in: path
        name: eventID
        required: true
        type: string
      - description: Идентификатор wishlist item
        in: path
        name: itemID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Сообщение об успешном бронировании
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Некорректный eventID или itemID
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Item уже забронирован или по нему уже есть финансирование
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "500":
          description: Внутренняя ошибка при бронировании item
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Забронировать wishlist item целиком
      tags:
      - wishlist
  /api/v1/events/{eventID}/wishlist/{itemID}/fund:
    post:
      consumes:
      - application/json
      description: |-
        Позволяет пользователю внести сумму в общий сбор средств на конкретный подарок.
        Используется для сценария коллективного подарка, когда несколько гостей складываются на одну позицию.
        Если item уже полностью забронирован, backend вернёт конфликт.
      parameters:
      - description: Идентификатор события
        in: path
        name: eventID
        required: true
        type: string
      - description: Идентификатор wishlist item
        in: path
        name: itemID
        required: true
        type: string
      - description: Тело запроса с суммой пополнения
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.FundItemRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Текущее накопленное значение current_fund
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Некорректный eventID, itemID, JSON или сумма
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Item уже полностью забронирован
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "500":
          description: Внутренняя ошибка при пополнении сбора
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Частично профинансировать wishlist item
      tags:
      - wishlist
  /api/v1/events/{eventID}/wishlist/ideas:
    post:
      consumes:
      - application/json
      description: |-
        Принимает текстовое предложение гостя и проверяет его на соответствие anti-wishlist ограничениям.
        В ответе backend возвращает, разрешена ли идея, а если нет — причину блокировки.
        Если идея допустима, в ответ также может быть возвращён созданный или подобранный item.
      parameters:
      - description: Идентификатор события
        in: path
        name: eventID
        required: true
        type: string
      - description: Тело запроса с текстом идеи подарка
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.SubmitGuestIdeaRequest'
      produces:
      - application/json
      responses:
        "200":
          description: 'Результат проверки идеи: allowed, reason, item'
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Некорректный eventID, JSON или пустой текст
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "500":
          description: Внутренняя ошибка при обработке идеи
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Отправить идею подарка от гостя
      tags:
      - wishlist
  /api/v1/events/{eventID}/wishlist/parse:
    post:
      consumes:
      - application/json
      description: |-
        Принимает произвольный текст и с помощью AI разбирает его на список желаемых подарков и anti-wishlist элементов.
        Обычно используется организатором события для первичного наполнения wishlist по заметкам, сообщениям или черновому описанию.
        В ответе возвращаются массивы items и anti_items, сформированные на основе текста.
      parameters:
      - description: Идентификатор события
        in: path
        name: eventID
        required: true
        type: string
      - description: Тело запроса со свободным текстом для разбора
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.ParseWishlistRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Сформированные массивы items и anti_items
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Некорректный eventID, JSON или пустой текст
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "500":
          description: Внутренняя ошибка при AI-разборе wishlist
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Разобрать свободный текст в wishlist и anti-wishlist
      tags:
      - wishlist
  /auth/max/complete:
    post:
      consumes:
      - application/json
      description: |-
        Второй шаг мобильного сценария входа.
        Метод принимает session_id, созданный через /auth/max/start, и init_data, полученный после открытия MAX mini app.
        Backend проверяет подпись MAX, срок действия init_data и соответствие start_param созданной auth session.
        После успешной проверки session переходит в состояние completed, но JWT ещё не выдаётся.
      parameters:
      - description: Тело запроса с session_id и init_data из MAX
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.CompleteMAXAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Auth session успешно завершена
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.MAXAuthSession'
              type: object
        "400":
          description: Некорректный JSON или обязательные поля отсутствуют
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: init_data невалиден, просрочен или start_param не соответствует
            session_id
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Auth session не найдена
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Сессия уже завершена, уже обменяна на JWT или истекла
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Завершить мобильный auth flow через MAX init_data
      tags:
      - auth
  /auth/max/exchange:
    post:
      consumes:
      - application/json
      description: |-
        Финальный шаг мобильного auth flow.
        Метод принимает session_id, проверяет, что auth session уже находится в состоянии completed, и только после этого выдаёт JWT backend.
        После успешного обмена повторное использование той же session запрещено.
      parameters:
      - description: Тело запроса с session_id для обмена на JWT
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.ExchangeMAXAuthRequest'
      produces:
      - application/json
      responses:
        "200":
          description: JWT успешно выдан
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.AuthSession'
              type: object
        "400":
          description: Некорректный JSON или пустой session_id
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Auth session не найдена
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Сессия ещё не готова, уже обменяна, уже использована или истекла
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Обменять completed auth session на локальный JWT
      tags:
      - auth
  /auth/max/login:
    post:
      consumes:
      - application/json
      description: |-
        Упрощённый сценарий авторизации для случая, когда frontend уже работает внутри MAX mini app.
        Метод принимает init_data из window.WebApp.initData, валидирует подпись, срок жизни данных и идентичность пользователя.
        Если пользователь ещё не существует в системе, он будет создан автоматически через OAuth-привязку.
        В ответе возвращается локальный JWT и профиль пользователя.
      parameters:
      - description: Тело запроса с init_data из MAX mini app
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.LoginWithMAXRequest'
      produces:
      - application/json
      responses:
        "200":
          description: JWT успешно выдан
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.AuthSession'
              type: object
        "400":
          description: Некорректный JSON или пустой init_data
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: init_data невалиден, просрочен или не прошёл проверку подписи
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Конфликт бизнес-логики авторизации
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Войти по MAX init_data и сразу получить JWT
      tags:
      - auth
  /auth/max/session/{sessionID}:
    get:
      description: |-
        Возвращает текущее состояние auth session, созданной через /auth/max/start.
        Используется для polling-сценария, когда один клиент ждёт, пока пользователь завершит вход в MAX на другом устройстве или в другом окне.
        Возможные статусы описаны в core.MAXAuthSession.
      parameters:
      - description: ID auth session
        in: path
        name: sessionID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Текущий статус auth session
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.MAXAuthSession'
              type: object
        "400":
          description: Некорректный session_id
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Auth session не найдена
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Получить статус MAX auth session
      tags:
      - auth
  /auth/max/start:
    post:
      description: |-
        Создаёт временную auth session для мобильного сценария входа через MAX.
        В ответе возвращается session_id и deep link на MAX mini app.
        Пользователь должен открыть ссылку, подтвердить вход внутри MAX, после чего фронтенд или backend может опрашивать статус сессии.
        Этот метод полезен, когда вход начинается не из уже открытого mini app, а из внешнего клиента.
      produces:
      - application/json
      responses:
        "201":
          description: Создана auth session и ссылка для входа
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.MAXAuthStart'
              type: object
        "503":
          description: 'MAX auth недоступен: не настроен bot username или недоступен
            внешний MAX API'
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      summary: Запустить мобильный auth flow через MAX mini app
      tags:
      - auth
  /events:
    post:
      consumes:
      - application/json
      description: |-
        Создаёт событие в статусе generating и запускает подбор через n8n webhook.
        Организатором события автоматически становится пользователь из Bearer JWT.
        В запросе нужно передать город, дату, время, масштаб, vibe и бюджет.
      parameters:
      - description: Тело запроса с параметрами события
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.CreateEventRequest'
      produces:
      - application/json
      responses:
        "202":
          description: Генерация события успешно запущена
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.Event'
              type: object
        "400":
          description: Некорректный JSON или ошибка валидации полей
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "503":
          description: Связь с n8n недоступна
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Создать событие
      tags:
      - events
  /events/{eventID}:
    get:
      description: |-
        Возвращает полную карточку события по его идентификатору.
        Доступ к методу ограничен middleware авторизации и проверкой прав доступа к конкретному событию.
        Если у пользователя нет права читать событие, backend вернёт 403.
      parameters:
      - description: Идентификатор события
        in: path
        name: eventID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Карточка события
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.Event'
              type: object
        "400":
          description: Некорректный eventID
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "403":
          description: Недостаточно прав для чтения события
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Событие не найдено
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Получить событие по ID
      tags:
      - events
  /events/{eventID}/guests:
    get:
      description: |-
        Возвращает список гостей, связанных с указанным событием.
        Можно дополнительно отфильтровать список по approval_status через query-параметр.
        Доступ к методу ограничен проверкой прав на чтение события.
      parameters:
      - description: Идентификатор события
        in: path
        name: eventID
        required: true
        type: string
      - description: 'Фильтр по статусу подтверждения: pending, approved, rejected'
        in: query
        name: approval_status
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Список гостей события
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/core.EventGuest'
                  type: array
              type: object
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "403":
          description: Недостаточно прав для просмотра гостей
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Получить список гостей события
      tags:
      - events
  /events/{eventID}/guests/{guestID}/status:
    patch:
      consumes:
      - application/json
      description: |-
        Обновляет attendance_status конкретного гостя в рамках события.
        Метод предназначен для сценария, когда сам пользователь подтверждает или отклоняет своё участие.
        Организатор и co_host не могут использовать этот endpoint для управления посещаемостью других пользователей.
      parameters:
      - description: Идентификатор события
        in: path
        name: eventID
        required: true
        type: string
      - description: Идентификатор гостя
        in: path
        name: guestID
        required: true
        type: string
      - description: Тело запроса с attendance_status
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.UpdateGuestStatusRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Статус посещения успешно обновлён
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.EventGuest'
              type: object
        "400":
          description: Некорректный JSON, eventID, guestID или attendance_status
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "403":
          description: Недостаточно прав для обновления статуса посещения
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Гость не найден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Обновить статус посещения гостя
      tags:
      - events
  /events/{eventID}/invite:
    get:
      description: |-
        Возвращает активный invite token для указанного события.
        Обычно используется организатором или соорганизатором, чтобы передать ссылку или token приглашённому пользователю.
      parameters:
      - description: Идентификатор события
        in: path
        name: eventID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Активный invite token события
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  properties:
                    token:
                      type: string
                  type: object
              type: object
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "403":
          description: Недостаточно прав для просмотра invite token
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Событие или invite token не найдены
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Получить invite token события
      tags:
      - events
  /events/{eventID}/stats:
    get:
      description: |-
        Возвращает агрегированную статистику по гостям указанного события.
        В ответ включаются счётчики по approval_status и attendance_status.
        Метод полезен для дашбордов, карточек события и административных экранов.
      parameters:
      - description: Идентификатор события
        in: path
        name: eventID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Статистика по гостям события
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.EventGuestStats'
              type: object
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "403":
          description: Недостаточно прав для просмотра статистики
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Получить статистику по гостям события
      tags:
      - events
  /events/{eventID}/variants/{variantID}/select:
    post:
      description: |-
        Устанавливает selected_variant_id для события.
        Выбор доступен только организатору события.
      parameters:
      - description: Идентификатор события
        in: path
        name: eventID
        required: true
        type: string
      - description: Идентификатор варианта события
        in: path
        name: variantID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: Вариант успешно выбран
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.Event'
              type: object
        "400":
          description: Некорректный eventID или variantID
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "403":
          description: Выбор варианта доступен только организатору
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Событие или вариант не найдены
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Выбрать итоговый вариант события
      tags:
      - events
  /events/join-by-token:
    post:
      consumes:
      - application/json
      description: |-
        Добавляет текущего пользователя в событие по invite token.
        Токен должен быть активным и принадлежать существующему событию.
        После успешного входа backend возвращает карточку события с ролью доступа пользователя в этом событии.
      parameters:
      - description: Тело запроса с invite token
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.JoinEventByTokenRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Пользователь успешно добавлен в событие
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.Event'
              type: object
        "400":
          description: Некорректный JSON или пустой token
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Invite token не найден или недействителен
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Конфликт при присоединении к событию
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Войти в событие по invite token
      tags:
      - events
  /events/my:
    get:
      description: |-
        Возвращает список событий, к которым текущий пользователь имеет отношение.
        В выборку попадают события, где пользователь является организатором, соорганизатором или гостем.
        Для каждого события backend дополнительно возвращает access_role и связанные статусы гостя, если они применимы.
      produces:
      - application/json
      responses:
        "200":
          description: Список событий текущего пользователя
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/core.Event'
                  type: array
              type: object
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Получить список моих событий
      tags:
      - events
  /healthz:
    get:
      description: |-
        Выполняет базовую healthcheck-проверку backend-сервиса.
        Endpoint дополнительно проверяет доступность PostgreSQL через Ping.
        Если приложение живо, но база недоступна, метод вернёт 503 и укажет database=unavailable.
      produces:
      - application/json
      responses:
        "200":
          description: Сервис и база доступны
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/action.HealthData'
              type: object
        "503":
          description: Сервис отвечает, но база недоступна
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/action.HealthData'
              type: object
      summary: Проверить состояние сервиса
      tags:
      - health
  /me:
    patch:
      consumes:
      - application/json
      description: |-
        Обновляет профиль пользователя, который определяется из Bearer JWT.
        Можно передать full_name, phone или оба поля сразу.
        Телефон нормализуется backend-логикой к цифровому виду без знака плюс и разделителей.
        Хотя бы одно поле должно быть передано, иначе метод вернёт ошибку валидации.
      parameters:
      - description: Тело запроса с обновлением full_name и/или phone
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/action.UpdateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Профиль успешно обновлён
          schema:
            allOf:
            - $ref: '#/definitions/response.SuccessEnvelope'
            - properties:
                data:
                  $ref: '#/definitions/core.User'
              type: object
        "400":
          description: Некорректный JSON или ошибка валидации полей
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "401":
          description: JWT отсутствует или невалиден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "404":
          description: Пользователь не найден
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
        "409":
          description: Конфликт при обновлении профиля
          schema:
            $ref: '#/definitions/response.ErrorEnvelope'
      security:
      - BearerAuth: []
      summary: Обновить профиль текущего пользователя
      tags:
      - auth
schemes:
- https
securityDefinitions:
  BearerAuth:
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
