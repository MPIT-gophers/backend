openapi: 3.0.3
info:
  title: mpit2026-reg API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Healthcheck
      responses:
        "200":
          description: Service is healthy
  /api/v1/registrations:
    get:
      summary: List registrations
      responses:
        "200":
          description: Registrations list
    post:
      summary: Create registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [full_name, email]
              properties:
                full_name:
                  type: string
                email:
                  type: string
      responses:
        "201":
          description: Registration created
        "409":
          description: Duplicate email

